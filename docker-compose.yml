version: '3.8'

services:
  banco:
    image: mysql:8.4
    container_name: gerador_mysql
    restart: always
    environment:
      MYSQL_DATABASE: 'gerador_matematica'
      MYSQL_ROOT_PASSWORD: 'sua_senha_segura_aqui'
    ports:
      - "3307:3306" # Mudou aqui! O Windows acessa pela 3307, mas o container continua na 3306 internamente
    volumes:
      - dados_mysql:/var/lib/mysql

  web:
    build: .
    container_name: gerador_flask
    restart: always
    ports:
      - "80:5000"
    depends_on:
      - banco
    environment:
      - DB_HOST=banco
      - DB_USER=root
      - DB_PASSWORD=sua_senha_segura_aqui
      - DB_NAME=gerador_matematica

volumes:
  dados_mysql:
