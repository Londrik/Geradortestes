<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

<div class="container" style="max-width: 700px;">
    <div class="card shadow p-4 border-0 rounded-3 bg-white">
        
        <h1 class="h3 fw-bold text-primary mb-1">{{ titulo }}</h1>
        <p class="text-muted small">Nível de Dificuldade: <span class="badge bg-secondary text-capitalize">{{ dificuldade }}</span></p>
        
        <hr class="my-4">

        <form action="/corrigir" method="POST">
            <input type="hidden" name="id_teste" value="{{ id_teste }}">
            
            <div class="mb-4">
                <label for="nome_aluno" class="form-label fw-semibold text-muted">Seu Nome Completo:</label>
                <input type="text" name="nome_aluno" id="nome_aluno" class="form-control" placeholder="Digite seu nome para o registro" required>
            </div>

            <hr class="mb-4">

            {% for q in questoes %}
            {% set id_questao = loop.index0 %} <div class="card mb-4 border-light bg-light p-3 rounded-3">
                <p class="fw-bold text-dark mb-3">{{ loop.index }}) {{ q.enunciado }}</p>
                
                {% for alt in q.alternativas %}
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="q{{ id_questao }}" value="{{ alt }}" id="q{{ id_questao }}_{{ loop.index0 }}" required>
                    <label class="form-check-label text-secondary" for="q{{ id_questao }}_{{ loop.index0 }}">
                        {{ alt }}
                    </label>
                </div>
                {% endfor %}
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-success w-100 fw-bold py-2 fs-5 shadow-sm mt-3">Enviar e Corrigir Teste</button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
