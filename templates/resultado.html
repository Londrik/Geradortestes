<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Teste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

<div class="container" style="max-width: 500px;">
    <div class="card shadow p-4 border-0 rounded-3 bg-white text-center">
        
        <h1 class="h3 fw-bold text-success mb-2">Teste Concluído com Sucesso!</h1>
        <p class="fs-5 text-muted">Parabéns, <strong class="text-primary">{{ nome }}</strong>!</p>
        
        <div class="bg-light p-4 rounded-3 my-4 border border-light">
            <p class="text-secondary small mb-1 uppercase fw-semibold tracking-wider">Sua Pontuação Final</p>
            <h2 class="display-3 fw-bold text-dark mb-0">{{ acertos }} / {{ total }}</h2>
            <p class="text-muted small mt-1">questões respondidas corretamente</p>
        </div>

        <a href="/" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Gerar um Novo Teste</a>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
