<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Testes Acadêmicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

<div class="container" style="max-width: 550px;">
    <div class="card shadow-sm p-4 border-0 rounded-3 bg-white">
        <h1 class="h4 text-center text-primary mb-4 fw-bold">Gerador de Testes • Ensino Médio</h1>
        
        <form action="/gerar" method="POST">
            <div class="mb-3">
                <label for="disciplina" class="form-label fw-semibold text-muted">Escolha a Disciplina:</label>
                <select name="disciplina" id="disciplina" class="form-select" onchange="atualizarMaterias()" required>
                    <option value="matematica" selected>Matemática</option>
                    <option value="fisica">Física</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="materia" class="form-label fw-semibold text-muted">Selecione o Conteúdo:</label>
                <select name="materia" id="materia" class="form-select" required>
                </select>
            </div>

            <div class="mb-4">
                <label for="dificuldade" class="form-label fw-semibold text-muted">Nível de Dificuldade:</label>
                <select name="dificuldade" id="dificuldade" class="form-select" required>
                    <option value="facil">Fácil</option>
                    <option value="intermediario" selected>Intermediário</option>
                    <option value="dificil">Difícil</option>
                    <option value="avancado">Avançado</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Gerar Caderno de Teste</button>
        </form>
        
        <div class="text-center mt-4 small text-black-50">
            SENAI Gama • Desenvolvimento de Sistemas
        </div>
    </div>
</div>

<script>
const opcoesMaterias = {
    matematica: `
        <optgroup label="Revisão & Fundamentos">
            <option value="aritmetica">Aritmética (Decimais e Operações)</option>
            <option value="conjuntos_numericos">Conjuntos Numéricos e Intervalos</option>
        </optgroup>
        <optgroup label="Funções (1º e 2º Grau)">
            <option value="funcao_afim">Função Afim (1º Grau)</option>
            <option value="funcao_quadratica">Função Quadrática (2º Grau)</option>
        </optgroup>
        <optgroup label="Álgebra Avançada">
            <option value="inequacoes">Inequações e Funções Modulares</option>
            <option value="sequencias">Sequências (PA e PG)</option>
        </optgroup>
        <optgroup label="Aplicações Práticas">
            <option value="financeira">Matemática Financeira</option>
            <option value="trigonometria">Trigonometria e Geometria Plana</option>
        </optgroup>
    `,
    fisica: `
        <optgroup label="Mecânica - Conteúdos">
            <option value="fundamentos_vetores">Vetores e Grandezas Físicas</option>
            <option value="cinematica_mru_mruv">Cinemática (MRU, MRUV e Queda Livre)</option>
            <option value="dinamica_leis_newton">Dinâmica (Leis de Newton e Atrito)</option>
            <option value="trabalho_energia">Trabalho, Potência e Energia</option>
            <option value="impulso_colisoes">Impulso e Quantidade de Movimento</option>
            <option value="estatica_gravitacao">Gravitação Universal e Estática</option>
            <option value="hidrostatica_empuxo">Hidrostática (Pressão e Empuxo)</option>
        </optgroup>
    `
};

function atualizarMaterias() {
    const disciplina = document.getElementById('disciplina').value;
    document.getElementById('materia').innerHTML = opcoesMaterias[disciplina];
}

// Inicia no primeiro carregamento
atualizarMaterias();
</script>
</body>
</html>
